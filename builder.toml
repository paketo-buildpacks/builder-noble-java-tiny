description = "Ubuntu 24.04 Noble Numbat tiny image with only Java buildpacks included. To use, specify buildpacks at build time."

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/java-native-image:14.6.0"
  version = "14.6.0"

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/java:22.0.0"
  version = "22.0.0"

[lifecycle]
  version = "0.21.9"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/java-native-image"
    version = "14.6.0"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/java"
    version = "22.0.0"

[stack]
  build-image = "docker.io/paketobuildpacks/ubuntu-noble-build:0.0.87"
  id = "io.buildpacks.stacks.noble"
  run-image = "docker.io/paketobuildpacks/ubuntu-noble-run-tiny:0.0.87"

[[targets]]
  arch = "amd64"
  os = "linux"

[[targets]]
  arch = "arm64"
  os = "linux"
